      <stop offset="0%" stop-color="#f3f8f7"/>
      <stop offset="100%" stop-color="#dfeeea"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a6c66"/>
      <stop offset="100%" stop-color="#16a08c"/>
